<!DOCTYPE html>
<html>
<head>
<title>Fish GBT 🐟</title>

<script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

#topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:#1e293b;
}

#chat{
width:500px;
margin:auto;
margin-top:40px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:6px;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

#messages{
margin-top:20px;
text-align:left;
}

.msg{
background:#1e293b;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="topbar">

<div>🐟 Fish GBT</div>

<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<div id="chat">

<h2>Your AI assistant</h2>

<input id="input" placeholder="Ask Fish GBT..." />
<button onclick="send()">Send</button>

<div id="messages"></div>

</div>

<script>

let auth0 = null

async function initAuth(){

auth0 = await createAuth0Client({
domain: "dev-hnpofj5u3w166j0p.eu.auth0.com",
client_id: "koTrNQIFMarJorJONfLyApdYKsKvZzsp",
authorizationParams:{
redirect_uri: window.location.origin
}
})

if(window.location.search.includes("code=")){
await auth0.handleRedirectCallback()
window.history.replaceState({},document.title,"/")
}

const isLogged = await auth0.isAuthenticated()

if(isLogged){
const user = await auth0.getUser()
console.log("Logged in:",user)
}

}

async function login(){
await auth0.loginWithRedirect()
}

async function logout(){
auth0.logout({
logoutParams:{
returnTo: window.location.origin
}
})
}

initAuth()

async function send(){

const input=document.getElementById("input")
const msg=input.value

if(msg.trim()=="") return

const messages=document.getElementById("messages")

messages.innerHTML+=`<div class="msg"><b>You:</b> ${msg}</div>`

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})

const data=await res.json()

messages.innerHTML+=`<div class="msg"><b>Fish GBT:</b> ${data.reply}</div>`

input.value=""

}

document.getElementById("input").addEventListener("keydown",function(e){
if(e.key==="Enter"){
send()
}
})

</script>

</body>
</html>
