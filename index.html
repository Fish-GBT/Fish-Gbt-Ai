```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fish GBT</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
}

#sidebar h2{
margin-top:0;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

/* BUBBLES */

.message{
padding:10px;
border-radius:8px;
margin-bottom:10px;
max-width:60%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
}

/* INPUT */

#inputArea{
display:flex;
padding:10px;
background:#020617;
}

#input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="sidebar">
<h2>Fish GBT</h2>
<button onclick="newChat()">New Chat</button>
</div>

<div id="main">

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="Send a message">
<button onclick="send()">Send</button>
</div>

</div>

<script>

async function send(){

const input=document.getElementById("input")
const msg=input.value.trim()

if(!msg) return

const messages=document.getElementById("messages")

messages.innerHTML+=`<div class="message user">${msg}</div>`

input.value=""

messages.scrollTop=messages.scrollHeight

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:msg
})
})

const data=await res.json()

messages.innerHTML+=`<div class="message ai">${data.reply}</div>`

messages.scrollTop=messages.scrollHeight

}

function newChat(){
document.getElementById("messages").innerHTML=""
}

document.getElementById("input").addEventListener("keydown",function(e){
if(e.key==="Enter"){
send()
}
})

</script>

</body>
</html>
```
