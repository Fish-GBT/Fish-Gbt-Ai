```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fish GBT</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:220px;
background:#020617;
padding:20px;
border-right:1px solid #1e293b;
}

#logo{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

#loginBtn{
background:#22c55e;
border:none;
padding:10px;
border-radius:6px;
color:white;
cursor:pointer;
margin-bottom:10px;
width:100%;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:60%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
}

#inputArea{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="sidebar">

<div id="logo">Fish GBT</div>

<button id="loginBtn">Login</button>
<button onclick="newChat()">New Chat</button>

</div>

<div id="main">

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="Send a message">
<button onclick="send()">Send</button>
</div>

</div>

<script>

let conversation = []

const messagesDiv = document.getElementById("messages")

async function send(){

const input=document.getElementById("input")
const msg=input.value.trim()

if(!msg) return

messagesDiv.innerHTML += `<div class="message user">${msg}</div>`

conversation.push({
role:"user",
content:msg
})

input.value=""

messagesDiv.scrollTop = messagesDiv.scrollHeight

const thinking = document.createElement("div")
thinking.className="message ai"
thinking.id="thinking"
thinking.innerText="Fish GBT is thinking..."
messagesDiv.appendChild(thinking)

messagesDiv.scrollTop = messagesDiv.scrollHeight

try{

const res = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
messages: conversation
})
})

const data = await res.json()

document.getElementById("thinking").remove()

messagesDiv.innerHTML += `<div class="message ai">${data.reply}</div>`

conversation.push({
role:"assistant",
content:data.reply
})

messagesDiv.scrollTop = messagesDiv.scrollHeight

}catch(e){

document.getElementById("thinking").remove()

messagesDiv.innerHTML += `<div class="message ai">AI error</div>`

}

}

function newChat(){
conversation=[]
messagesDiv.innerHTML=""
}

document.getElementById("input").addEventListener("keydown",function(e){
if(e.key==="Enter"){
send()
}
})

document.getElementById("loginBtn").onclick=function(){
alert("Login system coming soon")
}

</script>

</body>
</html>
