```html
<!DOCTYPE html>
<html>
<head>
<title>Fish GBT 🐟</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */

#topbar{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#38bdf8;
border-bottom:1px solid #1e293b;
}

/* CHAT AREA */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

/* CHAT BUBBLES */

.message{
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#0ea5e9;
margin-left:auto;
}

.ai{
background:#1e293b;
}

/* INPUT */

#inputArea{
display:flex;
padding:15px;
border-top:1px solid #1e293b;
background:#020617;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

/* FISH THINKING */

#thinkingFish{
display:none;
font-size:40px;
text-align:center;
animation:swim 2s infinite linear;
}

@keyframes swim{
0%{transform:translateX(-40px);}
50%{transform:translateX(40px);}
100%{transform:translateX(-40px);}
}

</style>
</head>

<body>

<div id="topbar">🐟 Fish GBT</div>

<div id="messages"></div>

<div id="thinkingFish">🐟</div>

<div id="inputArea">
<input id="input" placeholder="Ask Fish GBT..." />
<button onclick="send()">Send</button>
</div>

<script>

async function send(){

const input=document.getElementById("input")
const msg=input.value

if(msg.trim()=="") return

const messages=document.getElementById("messages")

messages.innerHTML+=`<div class="message user">${msg}</div>`

messages.scrollTop=messages.scrollHeight

/* special creator answer */

if(msg.toLowerCase().includes("who created you") ||
msg.toLowerCase().includes("who made you") ||
msg.toLowerCase().includes("vem skapade dig")){

messages.innerHTML+=`<div class="message ai">I was created by DD2_JR 🐟</div>`
messages.scrollTop=messages.scrollHeight
input.value=""
return
}

/* show fish loader */

document.getElementById("thinkingFish").style.display="block"

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})

const data=await res.json()

document.getElementById("thinkingFish").style.display="none"

messages.innerHTML+=`<div class="message ai">${data.reply}</div>`

messages.scrollTop=messages.scrollHeight

input.value=""

}

/* ENTER SEND */

document.getElementById("input").addEventListener("keydown",function(e){
if(e.key==="Enter"){
send()
}
})

</script>

</body>
</html>
```
