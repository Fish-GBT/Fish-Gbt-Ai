<!DOCTYPE html>
<html>

<head>
<title>Fish GBT 🐟</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
margin-top:30px;
}

#chat{
width:400px;
margin:auto;
margin-top:30px;
}

#messages{
margin-top:20px;
text-align:left;
display:flex;
flex-direction:column;
}

.message{
padding:12px;
margin:8px 0;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.user{
background:#22c55e;
margin-left:auto;
}

.ai{
background:#1e293b;
margin-right:auto;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 14px;
background:#22c55e;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<h1>Fish GBT 🐟</h1>
<p>Your AI assistant</p>

<div id="chat">

<input id="input" placeholder="Ask Fish GBT..." />
<button onclick="send()">Send</button>

<div id="messages"></div>

</div>

<script>

async function send(){

const input=document.getElementById("input");
const msg=input.value;

if(msg.trim()==="") return;

const messages=document.getElementById("messages");

messages.innerHTML+=`<div class="message user">${msg}</div>`;

messages.scrollTop=messages.scrollHeight;

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
});

const data=await res.json();

messages.innerHTML+=`<div class="message ai">${data.reply}</div>`;

messages.scrollTop=messages.scrollHeight;

input.value="";
}

document.getElementById("input").addEventListener("keydown",function(event){
if(event.key==="Enter"){
send();
}
});

</script>

</body>

</html>
