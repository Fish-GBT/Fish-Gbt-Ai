<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fish GBT 🐟</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#header{
background:#020617;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

#messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#0ea5e9;
margin-left:auto;
}

.ai{
background:#1e293b;
}

#inputArea{
display:flex;
padding:15px;
background:#020617;
}

#input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

#fish{
display:none;
font-size:40px;
text-align:center;
animation:swim 2s infinite linear;
}

@keyframes swim{
0%{transform:translateX(-30px);}
50%{transform:translateX(30px);}
100%{transform:translateX(-30px);}
}
</style>

</head>

<body>

<div id="header">🐟 Fish GBT</div>

<div id="messages"></div>

<div id="fish">🐟</div>

<div id="inputArea">
<input id="input" placeholder="Ask Fish GBT..." />
<button onclick="send()">Send</button>
</div>

<script>

async function send(){

const input=document.getElementById("input")
const msg=input.value

if(!msg) return

const messages=document.getElementById("messages")

messages.innerHTML+=`<div class="message user">${msg}</div>`
messages.scrollTop=messages.scrollHeight

input.value=""

document.getElementById("fish").style.display="block"

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})

const data=await res.json()

document.getElementById("fish").style.display="none"

messages.innerHTML+=`<div class="message ai">${data.reply}</div>`
messages.scrollTop=messages.scrollHeight

}

document.getElementById("input").addEventListener("keydown",function(e){
if(e.key==="Enter"){
send()
}
})

</script>

</body>
</html>
