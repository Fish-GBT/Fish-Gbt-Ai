<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fish GBT</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

#sidebar{
  width:220px;
  background:#020617;
  padding:20px;
  border-right:1px solid #1e293b;
}

#title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  max-width:65%;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.ai{
  background:#1e293b;
}

#inputBar{
  display:flex;
  padding:10px;
  background:#020617;
  border-top:1px solid #1e293b;
}

#input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

button{
  margin-left:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar">
  <div id="title">Fish GBT</div>
  <button onclick="newChat()">New Chat</button>
</div>

<div id="main">

  <div id="messages"></div>

  <div id="inputBar">
    <input id="input" placeholder="Ask Fish GBT...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

let conversation = []
const messages = document.getElementById("messages")

async function send(){

  const input = document.getElementById("input")
  const text = input.value.trim()

  if(!text) return

  messages.innerHTML += `<div class="message user">${text}</div>`

  conversation.push({
    role:"user",
    content:text
  })

  input.value=""

  const thinking = document.createElement("div")
  thinking.className="message ai"
  thinking.id="thinking"
  thinking.innerText="Fish GBT is thinking..."
  messages.appendChild(thinking)

  messages.scrollTop = messages.scrollHeight

  try{

    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        messages:conversation
      })
    })

    const data = await res.json()

    document.getElementById("thinking").remove()

    messages.innerHTML += `<div class="message ai">${data.reply}</div>`

    conversation.push({
      role:"assistant",
      content:data.reply
    })

    messages.scrollTop = messages.scrollHeight

  }catch(err){

    document.getElementById("thinking").remove()

    messages.innerHTML += `<div class="message ai">AI error</div>`

  }

}

function newChat(){
  conversation=[]
  messages.innerHTML=""
}

document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    send()
  }
})

</script>

</body>
</html>
