<!DOCTYPE html>
<html>
<head>
<title>Fish GBT 🐟</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#020617;
padding:20px;
box-sizing:border-box;
}

#sidebar h2{
margin-top:0;
}

.chat-item{
padding:8px;
margin-top:6px;
background:#1e293b;
border-radius:6px;
cursor:pointer;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

#header{
padding:15px;
border-bottom:1px solid #1e293b;
font-size:20px;
}

/* MESSAGES */

#messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.message{
padding:12px;
margin:8px 0;
border-radius:10px;
max-width:60%;
}

.user{
background:#22c55e;
margin-left:auto;
}

.ai{
background:#1e293b;
}

.thinking{
background:#334155;
font-style:italic;
}

/* INPUT */

#inputArea{
padding:15px;
border-top:1px solid #1e293b;
display:flex;
gap:10px;
}

#input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 14px;
background:#22c55e;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div id="sidebar">
<h2>Fish GBT 🐟</h2>

<div class="chat-item">New Chat</div>
<div class="chat-item">Example Chat</div>

</div>

<div id="main">

<div id="header">
Fish GBT AI
</div>

<div id="messages"></div>

<div id="inputArea">
<input id="input" placeholder="Ask Fish GBT..." />
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* TYPING ANIMATION */

function typeText(element,text){

let i=0

const interval=setInterval(()=>{

element.textContent+=text[i]

i++

if(i>=text.length){
clearInterval(interval)
}

},20)

}

/* SEND MESSAGE */

async function send(){

const input=document.getElementById("input")
const msg=input.value

if(msg.trim()==="") return

const messages=document.getElementById("messages")

messages.innerHTML+=`<div class="message user">${msg}</div>`

/* thinking message */

const thinking=document.createElement("div")
thinking.className="message ai thinking"
thinking.textContent="Fish GBT is thinking..."
messages.appendChild(thinking)

messages.scrollTop=messages.scrollHeight

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})

const data=await res.json()

thinking.remove()

const aiDiv=document.createElement("div")
aiDiv.className="message ai"
messages.appendChild(aiDiv)

typeText(aiDiv,data.reply)

messages.scrollTop=messages.scrollHeight

input.value=""

}

/* ENTER KEY */

document.getElementById("input").addEventListener("keydown",function(e){

if(e.key==="Enter"){
send()
}

})

</script>

</body>
</html>
